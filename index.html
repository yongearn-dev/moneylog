<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MoneyLog">
<meta name="theme-color" content="#060810">
<title>MoneyLog</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#060810;--bg2:#0D1018;--bg3:#131620;--bg4:#1A1E2C;--bg5:#20253A;
  --border:#1E2236;--border2:#2A3050;
  --accent:#7C6FFF;--accent2:#5B50CC;
  --green:#36F09A;--red:#FF4060;--orange:#FF7040;--yellow:#F5C842;
  --text:#DDE1F5;--muted:#4E5572;--dim:#2E3450;
  --safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px);
}
html,body{background:var(--bg);min-height:100vh}
body{color:var(--text);font-family:'DM Sans',sans-serif;padding-bottom:calc(66px + var(--safe-bot));overflow-x:hidden}
input,select,button,textarea{font-family:inherit;color-scheme:dark}
select option{background:var(--bg3);color:var(--text)}
input[type=date]::-webkit-calendar-picker-indicator,
input[type=month]::-webkit-calendar-picker-indicator{filter:invert(.6) brightness(1.2)}
.hdr{background:var(--bg2);border-bottom:1px solid var(--border);padding:calc(10px + var(--safe-top)) 13px 10px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.logo{font-size:17px;font-weight:800;letter-spacing:-.5px}
.logo em{color:var(--accent);font-style:normal}
.hdr-r{display:flex;gap:5px;align-items:center}
.pill{background:var(--bg4);border:1px solid var(--border2);color:var(--text);border-radius:8px;padding:5px 8px;font-size:12px;font-weight:700;cursor:pointer;outline:none}
.ibtn{background:transparent;border:none;color:var(--muted);cursor:pointer;padding:5px;display:flex;align-items:center;border-radius:7px}
.nav{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);display:flex;padding:5px 0 calc(6px + var(--safe-bot));z-index:50}
.nb{flex:1;border:none;background:transparent;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--dim);font-size:10px;font-weight:700;padding:0}
.nb.on{color:var(--accent)}
.ni{width:34px;height:34px;border-radius:11px;display:flex;align-items:center;justify-content:center;border:1px solid transparent}
.nb.on .ni{background:#7C6FFF18;border-color:#7C6FFF30}
.tabs{display:flex;gap:3px;background:var(--bg3);border-radius:11px;padding:3px}
.tab{flex:1;padding:7px 3px;border-radius:9px;border:none;cursor:pointer;font-size:13px;font-weight:700;background:transparent;color:var(--muted);display:flex;align-items:center;justify-content:center;gap:4px;white-space:nowrap}
.tab.on{background:var(--bg5);color:var(--text)}
.card{background:var(--bg3);border:1px solid var(--border);border-radius:15px;padding:13px 15px}
.cg{background:linear-gradient(135deg,rgba(54,240,154,.08),transparent);border-color:rgba(54,240,154,.18)}
.cr{background:linear-gradient(135deg,rgba(255,64,96,.08),transparent);border-color:rgba(255,64,96,.18)}
.cp{background:linear-gradient(135deg,rgba(124,111,255,.1),transparent);border-color:rgba(124,111,255,.2)}
.co{background:linear-gradient(135deg,rgba(255,112,64,.08),transparent);border-color:rgba(255,112,64,.18)}
.cy{background:linear-gradient(135deg,rgba(245,200,66,.08),transparent);border-color:rgba(245,200,66,.2)}
.clabel{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;margin-bottom:4px}
.cval{font-size:19px;font-weight:800}
.page{background:var(--bg);min-height:100vh;padding:12px 12px 20px;display:none}
.page.on{display:block}
.fl{margin-bottom:12px}
.flabel{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;display:block}
.inp{width:100%;padding:10px 12px;border-radius:10px;border:1.5px solid var(--border);background:var(--bg3);color:var(--text);font-size:15px;outline:none}
.inp:focus{border-color:rgba(124,111,255,.5);background:var(--bg4)}
.pbtn{width:100%;padding:14px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-size:15px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
.sbtn{padding:5px 10px;border-radius:8px;border:1px solid var(--border2);background:var(--bg4);color:#9099BB;font-size:12px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:4px}
.ebtn{padding:6px 10px;border-radius:8px;border:none;background:var(--accent);color:#fff;font-size:12px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:4px}
.dbtn{padding:4px 9px;border-radius:7px;border:1px solid rgba(255,64,96,.3);background:rgba(255,64,96,.08);color:var(--red);font-size:12px;font-weight:600;cursor:pointer}
.rrow{display:flex;align-items:center;gap:9px;padding:10px 11px;border-radius:12px;margin-bottom:6px;background:var(--bg3);border:1px solid var(--border)}
.rico{width:32px;height:32px;border-radius:9px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700}
.rinfo{flex:1;min-width:0}
.rcat{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rnote{color:var(--muted);font-weight:400}
.rsub{font-size:11px;color:var(--muted);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rright{display:flex;flex-direction:column;align-items:flex-end;gap:2px;flex-shrink:0}
.ramt{font-size:14px;font-weight:800}
.rconv{font-size:10px;color:var(--muted)}
.rdel{border:none;background:transparent;cursor:pointer;color:var(--dim);padding:3px;display:flex;align-items:center;flex-shrink:0}
.dwrap{display:flex;align-items:center;gap:12px}
.dleg{flex:1;min-width:0;display:flex;flex-direction:column;gap:5px}
.lrow{display:flex;align-items:center;gap:6px;font-size:12px}
.ldot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.lname{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lpct{color:var(--muted);font-size:10px;flex-shrink:0}
.lamt{font-weight:800;flex-shrink:0;font-size:12px}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.modal{background:var(--bg3);border:1px solid var(--border2);border-radius:20px 20px 0 0;padding:18px 13px calc(18px + var(--safe-bot));width:100%;max-width:480px}
.mtitle{font-size:16px;font-weight:800;margin-bottom:13px}
#toast{position:fixed;top:calc(14px + var(--safe-top));left:50%;transform:translateX(-50%);background:var(--bg4);border-radius:10px;padding:9px 17px;font-size:13px;font-weight:700;z-index:999;box-shadow:0 6px 30px rgba(0,0,0,.6);display:none;white-space:nowrap;border:1px solid transparent}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.shdr{font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.6px;margin-bottom:7px;display:flex;justify-content:space-between;align-items:center}
.rowc{display:flex;align-items:center;gap:7px}
.empty{text-align:center;color:var(--dim);padding:26px 0;font-size:13px}
.rnote2{font-size:11px;color:var(--muted);margin-top:3px}
.tprow{display:flex;gap:6px;margin-bottom:9px;overflow-x:auto;padding-bottom:2px}
.tpill{padding:4px 10px;border-radius:20px;border:1px solid var(--border2);background:var(--bg4);color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0}
.tpill.on{background:rgba(124,111,255,.2);border-color:rgba(124,111,255,.5);color:#A89FFF}
.dpc{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:11px 13px;margin-bottom:7px}
.dpname{font-size:14px;font-weight:800;margin-bottom:6px;display:flex;align-items:center;gap:7px}
.dprow{display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px;color:var(--muted)}
.dpnet{font-size:14px;font-weight:800;margin-top:7px;padding-top:7px;border-top:1px solid var(--border)}
svg{display:block}

/* ── Donut Carousel ── */
.dc-wrap{position:relative;overflow:hidden;border-radius:15px;touch-action:pan-y}
.dc-track{display:flex;transition:transform .32s cubic-bezier(.4,0,.2,1);will-change:transform}
.dc-slide{flex:0 0 100%;box-sizing:border-box;padding:13px 15px;background:var(--bg3);border-right:1px solid var(--border)}
.dc-slide:last-child{border-right:none}
.dc-dots{display:flex;justify-content:center;gap:5px;padding:8px 0 4px}
.dc-dot{width:6px;height:6px;border-radius:50%;background:var(--dim);cursor:pointer;transition:.2s}
.dc-dot.on{background:var(--accent);width:16px;border-radius:3px}
.dc-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;text-align:center}
.dc-empty{text-align:center;color:var(--dim);padding:20px 0;font-size:13px}
</style>
</head>
<body>

<div class="hdr">
  <div class="logo">💰 <em>MoneyLog</em></div>
  <div class="hdr-r">
    <button class="pill" id="langBtn" onclick="toggleLang()">中文</button>
    <select class="pill" id="currSel" onchange="setCurrency(this.value)">
      <option value="HKD">HKD</option>
      <option value="USD">USD</option>
      <option value="THB">THB</option>
    </select>
    <button class="ibtn" onclick="exportCSV()">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
    </button>
  </div>
</div>
<div id="toast"></div>

<!-- DASHBOARD -->
<div id="pg-dashboard" class="page on">
  <div style="margin-bottom:9px">
    <div class="tabs">
      <button class="tab on" id="dt-personal" onclick="setDashTab('personal')">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2M12 11a4 4 0 100-8 4 4 0 000 8z"/></svg>
        <span data-t="personal"></span>
      </button>
      <button class="tab" id="dt-shared" onclick="setDashTab('shared')">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2M9 11a4 4 0 100-8 4 4 0 000 8zM23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
        <span data-t="shared"></span>
      </button>
      <button class="tab" id="dt-debt" onclick="setDashTab('debt')">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        <span data-t="debt"></span>
      </button>
    </div>
  </div>

  <!-- Normal income/expense sections -->
  <div id="normal-dash">
    <div id="topic-filter-row" style="display:none">
      <div class="tprow" id="topic-pills"></div>
    </div>
    <div class="rowc" style="margin-bottom:9px">
      <div class="tabs" style="flex-shrink:0">
        <button class="tab on" id="vm-monthly" onclick="setVM('monthly')" data-t="month"></button>
        <button class="tab" id="vm-daily" onclick="setVM('daily')" data-t="day"></button>
      </div>
      <input type="month" id="fMonth" class="inp" style="flex:1;padding:7px 9px;font-size:13px" onchange="render()">
      <input type="date" id="fDay" class="inp" style="flex:1;padding:7px 9px;font-size:13px;display:none" onchange="render()">
    </div>
    <div style="text-align:right;font-size:11px;color:var(--muted);margin-bottom:6px">
      <span data-t="showIn"></span> <strong id="dcur" style="color:var(--text)">HKD</strong>
    </div>
    <div class="sgrid" style="margin-bottom:8px">
      <div class="card cg"><div class="clabel" style="color:var(--green)" data-t="income"></div><div class="cval" style="color:var(--green)" id="si">-</div></div>
      <div class="card cr"><div class="clabel" style="color:var(--red)" data-t="expense"></div><div class="cval" style="color:var(--red)" id="se">-</div></div>
    </div>
    <div class="card" id="sn-card" style="margin-bottom:12px">
      <div class="clabel" style="color:#8890BB" data-t="balance"></div>
      <div style="font-size:24px;font-weight:800;letter-spacing:-1px" id="sn">-</div>
    </div>
    <div id="cat-sec" style="margin-bottom:12px">
      <div class="shdr"><span data-t="expBreakdown"></span></div>
      <div class="dc-wrap" id="dc-wrap">
        <div class="dc-track" id="dc-track"></div>
      </div>
      <div class="dc-dots" id="dc-dots"></div>
    </div>
    <div class="shdr">
      <span><span data-t="recent"></span> <span id="rcnt" style="color:var(--dim)"></span></span>
      <button class="sbtn" onclick="goPage('list')" data-t="all"></button>
    </div>
    <div id="rlist"></div>
  </div>

  <!-- Debt dashboard -->
  <div id="dash-debt" style="display:none">
    <div class="sgrid" style="margin-bottom:8px">
      <div class="card cg"><div class="clabel" style="color:var(--green)" data-t="owedToMe"></div><div class="cval" style="color:var(--green)" id="d-owed-me">-</div></div>
      <div class="card cr"><div class="clabel" style="color:var(--red)" data-t="iOwe"></div><div class="cval" style="color:var(--red)" id="d-i-owe">-</div></div>
    </div>
    <div class="card cy" style="margin-bottom:12px">
      <div class="clabel" style="color:var(--yellow)" data-t="netDebt"></div>
      <div style="font-size:24px;font-weight:800;letter-spacing:-1px" id="d-net">-</div>
      <div style="font-size:11px;color:var(--muted);margin-top:3px" id="d-net-label"></div>
    </div>
    <div class="shdr" style="margin-bottom:8px"><span data-t="perPerson"></span></div>
    <div id="d-person-list"></div>
    <div class="shdr" style="margin-top:12px;margin-bottom:7px">
      <span data-t="debtHistory"></span>
      <button class="sbtn" onclick="goPage('debtlist')" data-t="all"></button>
    </div>
    <div id="d-recent-list"></div>
  </div>
</div>

<!-- ADD -->
<div id="pg-add" class="page">
  <div style="font-size:17px;font-weight:800;margin-bottom:14px" data-t="addRecord"></div>
  <div class="fl">
    <label class="flabel" data-t="account"></label>
    <div class="tabs">
      <button class="tab on" id="at-personal" onclick="setAddScope('personal')">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2M12 11a4 4 0 100-8 4 4 0 000 8z"/></svg>
        <span data-t="personal"></span>
      </button>
      <button class="tab" id="at-shared" onclick="setAddScope('shared')">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2M9 11a4 4 0 100-8 4 4 0 000 8zM23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
        <span data-t="shared"></span>
      </button>
      <button class="tab" id="at-debt" onclick="setAddScope('debt')">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        <span data-t="debt"></span>
      </button>
    </div>
  </div>

  <!-- Debt fields -->
  <div id="debt-add-fields" style="display:none">
    <div class="fl">
      <label class="flabel" data-t="debtType"></label>
      <div class="tabs">
        <button class="tab on" id="dty-lent" onclick="setDebtType('lent')"><span data-t="lentOut"></span></button>
        <button class="tab" id="dty-borrowed" onclick="setDebtType('borrowed')"><span data-t="borrowed"></span></button>
        <button class="tab" id="dty-repaid_me" onclick="setDebtType('repaid_me')"><span data-t="repaidMe"></span></button>
        <button class="tab" id="dty-i_repaid" onclick="setDebtType('i_repaid')"><span data-t="iRepaid"></span></button>
      </div>
    </div>
    <div class="fl">
      <label class="flabel" data-t="personName"></label>
      <input class="inp" type="text" id="d-person">
    </div>
    <div class="fl">
      <label class="flabel"><span data-t="amount"></span> (<span id="d-acur">HKD</span>)</label>
      <input class="inp" type="number" inputmode="decimal" placeholder="0" id="d-amt">
      <div class="rnote2" id="d-rprev"></div>
    </div>
    <div class="fl">
      <label class="flabel" data-t="date"></label>
      <input class="inp" type="date" id="d-date">
    </div>
    <div class="fl" style="margin-bottom:18px">
      <label class="flabel" data-t="note"></label>
      <input class="inp" type="text" id="d-note">
    </div>
    <button class="pbtn" onclick="addDebtRecord()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
      <span data-t="save"></span>
    </button>
  </div>

  <!-- Normal income/expense fields -->
  <div id="normal-add-fields">
    <div id="topic-fl" class="fl" style="display:none">
      <label class="flabel" data-t="projTopic"></label>
      <div style="display:flex;gap:7px">
        <select class="inp" id="f-topic" style="flex:1"></select>
        <button class="sbtn" onclick="openTopicModal()" style="flex-shrink:0">+ <span data-t="new"></span></button>
      </div>
    </div>
    <div class="fl">
      <label class="flabel" data-t="type"></label>
      <div class="tabs">
        <button class="tab on" id="ty-expense" onclick="setAddType('expense')">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12l7 7 7-7"/></svg>
          <span data-t="expense"></span>
        </button>
        <button class="tab" id="ty-income" onclick="setAddType('income')">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
          <span data-t="income"></span>
        </button>
      </div>
    </div>
    <div class="fl">
      <label class="flabel"><span data-t="amount"></span> (<span id="acur">HKD</span>)</label>
      <input class="inp" type="number" inputmode="decimal" placeholder="0" id="f-amt">
      <div class="rnote2" id="rprev"></div>
    </div>
    <div class="fl">
      <label class="flabel" data-t="category"></label>
      <select class="inp" id="f-cat" onchange="onMainCatChange()"></select>
    </div>
    <div class="fl" id="subcat-fl" style="display:none">
      <label class="flabel" data-t="subCategory"></label>
      <select class="inp" id="f-subcat"></select>
    </div>
    <div class="fl">
      <label class="flabel" data-t="date"></label>
      <input class="inp" type="date" id="f-date">
    </div>
    <div class="fl" style="margin-bottom:18px">
      <label class="flabel" data-t="note"></label>
      <input class="inp" type="text" id="f-note">
    </div>
    <button class="pbtn" onclick="addRecord()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
      <span data-t="save"></span>
    </button>
  </div>
</div>

<!-- LIST -->
<div id="pg-list" class="page">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <div style="font-size:17px;font-weight:800" data-t="allRecords"></div>
    <button class="ebtn" onclick="exportCSV()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
      <span data-t="export"></span>
    </button>
  </div>
  <div class="tabs" style="margin-bottom:10px">
    <button class="tab on" id="lt-personal" onclick="setListTab('personal')">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2M12 11a4 4 0 100-8 4 4 0 000 8z"/></svg>
      <span data-t="personal"></span>
    </button>
    <button class="tab" id="lt-shared" onclick="setListTab('shared')">

const CC = ['#FF6B8A','#FF9D5C','#F5C842','#4FE88A','#4CB8F5','#A87DFF','#FF7EC8','#45D4AA','#F07060','#60D0EA','#FFB060','#B0E060','#7090D8','#40C8B8'];
const _cc = {}; let _ci = 0;
function catColor(k){ if(!_cc[k]){_cc[k]=CC[_ci++%CC.length];} return _cc[k]; }
(function(){
  [...CAT_KEYS.personal.expense,...CAT_KEYS.personal.income,...CAT_KEYS.shared.expense,...CAT_KEYS.shared.income].forEach(k=>catColor(k));

  Object.values(SHARED_SUB).forEach(subs=>subs.forEach(s=>catColor(s.k)));

function getCatKey(r){
  if(r.catKey) return r.catKey;
  const sc=r.scope||'personal', tp=r.type==='income'?'income':'expense';
  for(const lg of['en','zh']){ const idx=(CAT_LABELS[lg][sc]||{[tp]:[]})[tp].indexOf(r.category); if(idx!==-1) return CAT_KEYS[sc][tp][idx]; }
  return r.category;
}
function getCatLabel(key,scope,type){
  const keys=CAT_KEYS[scope][type], labels=(CAT_LABELS[lang]||CAT_LABELS.en)[scope][type];
  const i=keys.indexOf(key); return i!==-1?labels[i]:key;
}

// ---- i18n ----

let lang = localStorage.getItem('ml_lang') || 'en';
const tr = k => T[lang][k] || k;

  document.querySelectorAll('[data-t]').forEach(el => { el.textContent = tr(el.dataset.t); });

// ---- Currency ----
const TO_HKD = { HKD:1, USD:7.78, THB:1/4.1 };
const SYM = { HKD:'HK$', USD:'US$', THB:'\u0E3F' };
const toHKD   = (a,c) => a*(TO_HKD[c]||1);
const fromHKD = (a,c) => a/(TO_HKD[c]||1);
const convert = (a,f,t) => f===t?a:fromHKD(toHKD(a,f),t);
function fmt(a,c){ c=c||currency; const v=Math.round(a*10)/10; return (SYM[c]||c)+new Intl.NumberFormat('en',{minimumFractionDigits:0,maximumFractionDigits:1}).format(v); }

// ---- State & Storage ----
const SK = 'moneylog_v5';
const HY = 183*86400*1000;
let records=[], topics=[], debts=[], currency='HKD';
let dashScope='personal', listScope='personal', addScope='personal';
let addType_='expense', viewMode='monthly', addTopicSel='', dashTopicFilter='';
let debtType_='lent';

const today     = () => new Date().toISOString().slice(0,10);
const thisMonth = () => today().slice(0,7);

function loadData(){
  try{ const d=localStorage.getItem(SK); if(d){ const p=JSON.parse(d); records=p.r||[]; topics=p.t||[]; debts=p.d||[]; currency=p.c||'HKD'; lang=p.l||lang; } }catch{}
  records=records.filter(r=>new Date(r.date).getTime()>Date.now()-HY);
}
function save(){ localStorage.setItem(SK,JSON.stringify({r:records,t:topics,d:debts,c:currency,l:lang})); }

// ---- Topics ----
function refreshTopicSel(){
  const sel=document.getElementById('f-topic');
  sel.innerHTML='<option value="">'+tr('selTopic')+'</option>'+topics.map(tp=>'<option value="'+tp.id+'"'+(tp.id===addTopicSel?' selected':'')+'>'+tp.name+'</option>').join('');
}
function openTopicModal(){ renderTopicList(); document.getElementById('tmodal').style.display='flex'; }
function closeTopicModal(){ document.getElementById('tmodal').style.display='none'; refreshTopicSel(); }
function doAddTopic(){
  const inp=document.getElementById('new-topic'), name=inp.value.trim(); if(!name) return;
  topics.push({id:Date.now().toString(),name,date:today()}); save(); inp.value=''; renderTopicList(); refreshTopicSel(); renderTopicPills();
}
function delTopic(id){
  topics=topics.filter(tp=>tp.id!==id); if(addTopicSel===id) addTopicSel=''; if(dashTopicFilter===id) dashTopicFilter='';
  save(); renderTopicList(); refreshTopicSel(); renderTopicPills();
}
function renderTopicList(){
  const el=document.getElementById('tlist');
  if(!topics.length){ el.innerHTML='<div class="empty">'+tr('noRecAll')+'</div>'; return; }
  el.innerHTML=topics.map(tp=>'<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)"><div style="flex:1;font-size:14px;font-weight:700">'+tp.name+'</div><div style="font-size:11px;color:var(--muted)">'+tp.date+'</div><button class="dbtn" onclick="delTopic(\''+tp.id+'\')">x</button></div>').join('');
}
function renderTopicPills(){
  const row=document.getElementById('topic-filter-row'), pills=document.getElementById('topic-pills');
  if(dashScope!=='shared'||!topics.length){ row.style.display='none'; return; }
  row.style.display='';
  pills.innerHTML='<button class="tpill'+(dashTopicFilter===''?' on':'')+'" onclick="setTopicFilter(\'\')">'+tr('allTopics')+'</button>'+topics.map(tp=>'<button class="tpill'+(dashTopicFilter===tp.id?' on':'')+'" onclick="setTopicFilter(\''+tp.id+'\')">'+tp.name+'</button>').join('');
}
function setTopicFilter(id){ dashTopicFilter=id; renderTopicPills(); render(); }

// ---- Navigation ----
const PAGES=['dashboard','add','list','debtlist'];
function goPage(p){

// ---- Dashboard ----
function setDashTab(s){
  dashScope=s; if(s!=='shared') dashTopicFilter='';
  ['personal','shared','debt'].forEach(x=>document.getElementById('dt-'+x).classList.toggle('on',x===s));
  const isDebt=s==='debt';

function setVM(m){

function getFiltered(){
  const fm=document.getElementById('fMonth').value, fd=document.getElementById('fDay').value;
  return records.filter(r=>{
    if(r.scope!==dashScope) return false;
    const dm=viewMode==='monthly'?r.date.startsWith(fm):r.date===fd;
    if(!dm) return false;
    if(dashScope==='shared'&&dashTopicFilter) return r.topicId===dashTopicFilter;
    return true;
  });
}
function render(){
  document.getElementById('dcur').textContent=currency;
  renderTopicPills();
  const recs=getFiltered();
  const inc=recs.filter(r=>r.type==='income').reduce((s,r)=>s+convert(r.amount,r.cur||'HKD',currency),0);
  const exp=recs.filter(r=>r.type==='expense').reduce((s,r)=>s+convert(r.amount,r.cur||'HKD',currency),0);
  const net=inc-exp;
  document.getElementById('si').textContent=fmt(inc);
  document.getElementById('se').textContent=fmt(exp);
  document.getElementById('sn').textContent=fmt(net);
  document.getElementById('sn').style.color=net>=0?'#A89FFF':'var(--orange)';
  document.getElementById('sn-card').className='card '+(net>=0?'cp':'co');
  // Build main-category map (always by mainKey)
  const mainCatMap={};
  recs.filter(r=>r.type==='expense').forEach(r=>{
    const k=getCatKey(r);
    mainCatMap[k]=(mainCatMap[k]||0)+convert(r.amount,r.cur||'HKD',currency);
  });
  const mainCats=Object.entries(mainCatMap).sort((a,b)=>b[1]-a[1]);
  const sec=document.getElementById('cat-sec'); sec.style.display=mainCats.length?'':'none';
  if(mainCats.length) buildDonutCarousel(mainCats, recs.filter(r=>r.type==='expense'), dashScope);
  const sorted=[...recs].sort((a,b)=>b.date.localeCompare(a.date));
  document.getElementById('rcnt').textContent='('+sorted.length+')';
  document.getElementById('rlist').innerHTML=sorted.length===0?'<div class="empty">'+tr('noRec')+'</div>':sorted.slice(0,8).map(r=>rowHTML(r)).join('');
}


// ---- DONUT CAROUSEL ----
let _dcIdx = 0;  // current slide index

function buildDonutCarousel(mainCats, expRecs, scope) {
  _dcIdx = 0;
  const track = document.getElementById('dc-track');
  const dots  = document.getElementById('dc-dots');

  // Slide 0: Overview — all main categories
  const slides = [];
  const total  = mainCats.reduce((s,[,v])=>s+v,0);
  slides.push({ title: lang==='zh'?'\u7E3D\u89BD':'Overview', cats: mainCats, total });

  // One slide per main cat that has sub-categories and has records
  mainCats.forEach(([mainKey]) => {
    const subs = SHARED_SUB[mainKey];
    if (!subs) return;
    // Build sub-cat totals for this main key
    const subMap = {};
    expRecs.filter(r=>getCatKey(r)===mainKey && r.subKey).forEach(r=>{
      subMap[r.subKey]=(subMap[r.subKey]||0)+convert(r.amount,r.cur||'HKD',currency);
    });
    const subCats = Object.entries(subMap).sort((a,b)=>b[1]-a[1]);
    if (!subCats.length) return;
    const subTotal = subCats.reduce((s,[,v])=>s+v,0);
    const mainLabel = getCatLabel(mainKey, scope, 'expense');
    slides.push({ title: mainLabel, cats: subCats, total: subTotal, isSub: true, mainKey });
  });

  // Render slides
  track.innerHTML = slides.map((s, i) => {
    const donutHTML = buildDonut(s.cats, s.total, scope, 'expense', s.isSub ? s.mainKey : null);
    return '<div class="dc-slide">'
      + '<div class="dc-title">' + s.title + '</div>'
      + donutHTML
      + '</div>';
  }).join('');

  // Render dots
  dots.innerHTML = slides.map((_, i) =>
    '<div class="dc-dot'+(i===0?' on':'')+'" onclick="dcGoTo('+i+')"></div>'
  ).join('');

  dcSetPos(0, false);
  initCarouselSwipe();
}

function dcSetPos(idx, animate) {
  const track = document.getElementById('dc-track');
  if (!track) return;
  if (!animate) track.style.transition = 'none';
  else track.style.transition = 'transform .32s cubic-bezier(.4,0,.2,1)';
  track.style.transform = 'translateX(-' + (idx * 100) + '%)';
  // Update dots
  document.querySelectorAll('.dc-dot').forEach((d,i) => d.classList.toggle('on', i===idx));
  _dcIdx = idx;
  // Re-enable transition
  if (!animate) requestAnimationFrame(()=>{ if(track) track.style.transition=''; });
}

function dcGoTo(idx) {
  const total = document.querySelectorAll('.dc-slide').length;
  if (idx < 0 || idx >= total) return;
  dcSetPos(idx, true);
}

// Touch/swipe support
function initCarouselSwipe() {
  const wrap = document.getElementById('dc-wrap');
  if (!wrap || wrap._swipeInit) return;
  wrap._swipeInit = true;
  let startX = 0, startY = 0, dragging = false, moved = false;

  wrap.addEventListener('touchstart', e => {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    dragging = true; moved = false;
  }, { passive: true });

  wrap.addEventListener('touchmove', e => {
    if (!dragging) return;
    const dx = e.touches[0].clientX - startX;
    const dy = e.touches[0].clientY - startY;
    if (!moved && Math.abs(dy) > Math.abs(dx)) { dragging = false; return; }
    moved = true;
    // Live drag feedback
    const base = _dcIdx * 100;
    const pct  = (dx / wrap.offsetWidth) * 100;
    const track = document.getElementById('dc-track');
    if (track) {
      track.style.transition = 'none';
      track.style.transform  = 'translateX(calc(-' + base + '% + ' + dx + 'px))';
    }
  }, { passive: true });

  wrap.addEventListener('touchend', e => {
    if (!dragging) return;
    dragging = false;
    const dx   = e.changedTouches[0].clientX - startX;
    const total = document.querySelectorAll('.dc-slide').length;
    const threshold = wrap.offsetWidth * 0.25;
    if (dx < -threshold && _dcIdx < total - 1) dcGoTo(_dcIdx + 1);
    else if (dx > threshold && _dcIdx > 0)     dcGoTo(_dcIdx - 1);
    else dcSetPos(_dcIdx, true);
  }, { passive: true });

  // Mouse drag support for desktop/preview
  wrap.addEventListener('mousedown', e => {
    startX = e.clientX; dragging = true; moved = false;
    e.preventDefault();
  });
  wrap.addEventListener('mousemove', e => {
    if (!dragging) return;
    moved = true;
    const dx    = e.clientX - startX;
    const base  = _dcIdx * 100;
    const track = document.getElementById('dc-track');
    if (track) { track.style.transition='none'; track.style.transform='translateX(calc(-'+base+'% + '+dx+'px))'; }
  });
  wrap.addEventListener('mouseup', e => {
    if (!dragging) return;
    dragging = false;
    const dx    = e.clientX - startX;
    const total = document.querySelectorAll('.dc-slide').length;
    const threshold = 60;
    if (dx < -threshold && _dcIdx < total-1) dcGoTo(_dcIdx+1);
    else if (dx > threshold && _dcIdx > 0)   dcGoTo(_dcIdx-1);
    else dcSetPos(_dcIdx, true);
  });
  wrap.addEventListener('mouseleave', e => { if(dragging){ dragging=false; dcSetPos(_dcIdx,true); } });
}

// ---- Donut ----
function buildDonut(cats,total,scope,type,parentKey){
  if(!total||!cats.length) return '';
  const R=52,r=33,cx=60,cy=60,sz=120; let paths='',angle=-Math.PI/2;
  const slices=cats.slice(0,9); const rest=cats.slice(9).reduce((s,[,v])=>s+v,0);
  if(rest>0) slices.push(['__others__',rest]);
  slices.forEach(([key,val])=>{
    const pct=val/total, sw=pct*2*Math.PI;
    const x1=cx+R*Math.cos(angle),y1=cy+R*Math.sin(angle),x2=cx+R*Math.cos(angle+sw),y2=cy+R*Math.sin(angle+sw);
    const x3=cx+r*Math.cos(angle+sw),y3=cy+r*Math.sin(angle+sw),x4=cx+r*Math.cos(angle),y4=cy+r*Math.sin(angle);
    const lg=sw>Math.PI?1:0, col=catColor(key);
    if(pct>0.001) paths+='<path d="M'+x1+','+y1+'A'+R+','+R+' 0 '+lg+',1 '+x2+','+y2+'L'+x3+','+y3+'A'+r+','+r+' 0 '+lg+',0 '+x4+','+y4+'Z" fill="'+col+'" stroke="var(--bg)" stroke-width="1.5"/>';
    angle+=sw;
  });
  const dispTotal=fmt(total).replace('HK$','$').replace('US$','$');
  const legendHTML=slices.map(([key,val])=>{
    const pct=Math.round(val/total*100), col=catColor(key);
    let label;
    if (key==='__others__') { label = lang==='zh'?'\u5176\u4ED6':'Others'; }
    else if (parentKey && SHARED_SUB[parentKey]) {
      // sub-category slide: look up label from SHARED_SUB
      const found = SHARED_SUB[parentKey].find(s=>s.k===key);
      label = found ? (lang==='zh'?found.zh:found.en) : key;
    } else {
      // overview slide: may be sub-key or main key
      const subLabel = getSubLabel(key);
      label = subLabel !== key ? subLabel : getCatLabel(key,scope,type);
    }
    return '<div class="lrow"><div class="ldot" style="background:'+col+'"></div><div class="lname">'+label+'</div><div class="lpct">'+pct+'%</div><div class="lamt" style="color:'+col+'">'+fmt(val)+'</div></div>';
  }).join('');
  return '<div class="dwrap"><svg width="'+sz+'" height="'+sz+'" viewBox="0 0 '+sz+' '+sz+'" style="flex-shrink:0">'+paths+'<circle cx="'+cx+'" cy="'+cy+'" r="'+(r-2)+'" fill="var(--bg3)"/><text x="'+cx+'" y="'+(cy-4)+'" text-anchor="middle" font-size="9" fill="var(--muted)" font-family="DM Sans">'+tr('expense')+'</text><text x="'+cx+'" y="'+(cy+9)+'" text-anchor="middle" font-size="11" fill="var(--text)" font-family="DM Sans" font-weight="800">'+dispTotal+'</text></svg><div class="dleg">'+legendHTML+'</div></div>';
}

function computeDebtByPerson(){
  const map={};
  debts.forEach(d=>{
    if(!map[d.person]) map[d.person]={lent:0,borrowed:0,repaidMe:0,iRepaid:0};
    const a=convert(d.amount,d.cur||'HKD',currency);
    if(d.dtype==='lent') map[d.person].lent+=a;
    if(d.dtype==='borrowed') map[d.person].borrowed+=a;
    if(d.dtype==='repaid_me') map[d.person].repaidMe+=a;
    if(d.dtype==='i_repaid') map[d.person].iRepaid+=a;
  });
  return Object.entries(map).map(([name,v])=>{
    const theyOweMe=v.lent-v.repaidMe, iOweThem=v.borrowed-v.iRepaid;
    return {name,theyOweMe,iOweThem,net:theyOweMe-iOweThem,raw:v};
  }).sort((a,b)=>Math.abs(b.net)-Math.abs(a.net));
}
function renderDebtDash(){
  const persons=computeDebtByPerson();

  const netPos=totalOwedMe-totalIOwe;
  document.getElementById('d-owed-me').textContent=fmt(totalOwedMe);
  document.getElementById('d-i-owe').textContent=fmt(totalIOwe);
  document.getElementById('d-net').textContent=fmt(Math.abs(netPos));
  document.getElementById('d-net').style.color=netPos>0?'var(--green)':netPos<0?'var(--red)':'var(--muted)';
  document.getElementById('d-net-label').textContent=netPos>0?tr('netPositive'):netPos<0?tr('netNegative'):tr('netZero');

  if(!persons.length){el.innerHTML='<div class="empty">'+tr('noRec')+'</div>';return;}
  el.innerHTML=persons.map(p=>{
    const nc=p.net>0?'var(--green)':p.net<0?'var(--red)':'var(--muted)';
    const nl=p.net>0?(lang==='zh'?'\u6B20\u6211':' owes me'):p.net<0?(lang==='zh'?'\u6211\u6B20\u4F60':' I owe'):(lang==='zh'?'\u5DF2\u7D50\u6E05':'Settled');
    const rows=[];
    if(p.raw.lent>0) rows.push([lang==='zh'?'\u501F\u51FA':'Lent out',fmt(p.raw.lent),'var(--green)']);
    if(p.raw.repaidMe>0) rows.push([lang==='zh'?'\u5DF2\u6536\u56DE':'Repaid me',fmt(p.raw.repaidMe),'var(--muted)']);
    if(p.raw.borrowed>0) rows.push([lang==='zh'?'\u501F\u5165':'Borrowed',fmt(p.raw.borrowed),'var(--red)']);
    if(p.raw.iRepaid>0) rows.push([lang==='zh'?'\u5DF2\u9084\u6B3E':'I repaid',fmt(p.raw.iRepaid),'var(--muted)']);
    const initials=p.name.charAt(0).toUpperCase();
    return '<div class="dpc"><div class="dpname"><div style="width:28px;height:28px;border-radius:50%;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:var(--accent)">'+initials+'</div><span>'+p.name+'</span></div>'+rows.map(([l,v,c])=>'<div class="dprow"><span>'+l+'</span><span style="color:'+c+';font-weight:700">'+v+'</span></div>').join('')+'<div class="dpnet" style="color:'+nc+'">'+(Math.abs(p.net)<0.1?'Settled':fmt(Math.abs(p.net))+' '+nl)+'</div></div>';
  }).join('');
  const recent=[...debts].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,5);

function buildEditCatList(scope, type, selectedKey) {

function saveEdit() {
  if (editKind === 'rec') {
    const r = records.find(x => x.id === editId);
    if (!r) return;
    const amt = parseFloat(document.getElementById('e-amount').value);
    const catKey = document.getElementById('e-cat').value;
    const date   = document.getElementById('e-date').value;
    const note   = document.getElementById('e-note').value.trim();

    if (!catKey) return toast(tr('eCat'), false);
    if (!date)   return toast(tr('eDate'), false);
    const labels = (CAT_LABELS[lang]||CAT_LABELS.en)[r.scope][type];
    const keys   = CAT_KEYS[r.scope][type];
    r.type     = type;
    r.amount   = amt;
    r.catKey   = catKey;
    r.category = labels[keys.indexOf(catKey)] || catKey;
    r.subKey   = (r.scope==='shared' && type==='expense' && SHARED_SUB[catKey])
      ? (document.getElementById('e-subcat').value || '') : '';
    r.date     = date;
    r.note     = note;
  } else {
    const d = debts.find(x => x.id === editId);

    const person = document.getElementById('e-person').value.trim();

  toast(tr('saved'));

  return subKey;

function buildSubCatOptions(parentKey, selId, selectedSubKey) {
  const fl = document.getElementById(selId === 'f-subcat' ? 'subcat-fl' : 'e-subcat-fl');
  const sel = document.getElementById(selId);
  const subs = SHARED_SUB[parentKey];
  if (!subs) { fl.style.display = 'none'; return; }
  fl.style.display = '';
  sel.innerHTML = subs.map(s =>
    '<option value="'+s.k+'"'+(s.k===selectedSubKey?' selected':'')+'>'+
    (lang==='zh'?s.zh:s.en)+'</option>'
  ).join('');
}

function onMainCatChange() {
  const key = document.getElementById('f-cat').value;
  // Show sub-cat only for shared expense
  if (addScope === 'shared' && addType_ === 'expense' && SHARED_SUB[key]) {
    buildSubCatOptions(key, 'f-subcat', null);
  } else {
    document.getElementById('subcat-fl').style.display = 'none';
  }
}

function onEditMainCatChange() {
  const key = document.getElementById('e-cat').value;
  const r = editId ? records.find(x => x.id === editId) : null;
  if (r && r.scope === 'shared' && SHARED_SUB[key]) {
    buildSubCatOptions(key, 'e-subcat', r.subKey || null);
  } else {
    document.getElementById('e-subcat-fl').style.display = 'none';
  }
}

// Helper: get display label combining main cat + sub cat
function getFullCatLabel(r) {
  const scope = r.scope || 'personal';
  const type  = r.type === 'income' ? 'income' : 'expense';
  const mainLabel = getCatLabel(getCatKey(r), scope, type);
  if (r.subKey) {
    const subLabel = getSubLabel(r.subKey);
    return mainLabel + ' · ' + subLabel;
  }
  return mainLabel;
}

// ---- Export ----
function exportCSV(){
  const rows=[['Date','Type','Amount','Currency','HKD Equiv','Category Key','Category','Sub-category','Note','Account','Topic']];
  [...records].sort((a,b)=>a.date.localeCompare(b.date)).forEach(r=>{
    const tp=r.topicId?topics.find(x=>x.id===r.topicId):null, key=getCatKey(r);
    const subLabel = r.subKey ? getSubLabel(r.subKey) : '';
    rows.push([r.date,r.type==='income'?'Income':'Expense',r.amount,r.cur||'HKD',Math.round(toHKD(r.amount,r.cur||'HKD')*10)/10,key,r.category||'',subLabel,r.note||'',r.scope==='personal'?'Personal':'Shared',tp?tp.name:'']);
  });
  rows.push([]); rows.push(['--- DEBT RECORDS ---']); rows.push(['Date','Type','Person','Amount','Currency','HKD Equiv','Note']);
  [...debts].sort((a,b)=>a.date.localeCompare(b.date)).forEach(d=>{ rows.push([d.date,dtypeLabel(d.dtype),d.person,d.amount,d.cur||'HKD',Math.round(toHKD(d.amount,d.cur||'HKD')*10)/10,d.note||'']); });
  const csv=rows.map(r=>r.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(',')).join('\n');
  const url=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'}));
  const a=document.createElement('a'); a.href=url; a.download='MoneyLog_'+today()+'.csv'; a.click(); URL.revokeObjectURL(url); toast(tr('exported'));
}

// ---- Toast ----
let _tt;
function toast(msg,ok=true){ const el=document.getElementById('toast'); el.textContent=msg; el.style.display='block'; el.style.borderColor=ok?'rgba(124,111,255,.4)':'rgba(255,64,96,.4)'; el.style.color=ok?'#A89FFF':'var(--red)'; clearTimeout(_tt); _tt=setTimeout(()=>el.style.display='none',2200); }

// ---- Init ----
loadData();
document.getElementById('fMonth').value=thisMonth();
document.getElementById('fDay').value=today();
document.getElementById('f-date').value=today();
document.getElementById('d-date').value=today();
document.getElementById('currSel').value=currency;
document.getElementById('acur').textContent=currency;
document.getElementById('d-acur').textContent=currency;
document.getElementById('f-amt').addEventListener('input',updateRatePrev);
document.getElementById('d-amt').addEventListener('input',function(){ const el=document.getElementById('d-rprev'),a=parseFloat(this.value); if(!a||currency==='HKD'){el.textContent='';return;} el.textContent='approx '+fmt(convert(a,currency,'HKD'),'HKD'); });
applyLang();
</script>
